<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Streafler Admin</title>
  <style>
    :root {
      --panel: rgba(7, 18, 31, 0.9);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f3f7fb;
      --muted: #9cb4ca;
      --accent: #8cefff;
      --danger: #ff9aa5;
      --ok: #90ffc2;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(118, 227, 255, 0.12), transparent 28%),
        linear-gradient(160deg, #05070d 0%, #091321 52%, #05070d 100%);
    }

    .shell { max-width: 1040px; margin: 0 auto; display: grid; gap: 20px; }

    .panel {
      padding: 22px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(34px, 6vw, 52px); line-height: 0.95; letter-spacing: -0.04em; margin-bottom: 10px; }
    h2 { font-size: 24px; letter-spacing: -0.02em; margin-bottom: 8px; }

    p { color: var(--muted); line-height: 1.45; }

    .top-actions, .button-row, .item-actions {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .top-actions { margin-top: 16px; }

    .fields { display: grid; gap: 16px; margin-top: 18px; }

    label { display: grid; gap: 8px; font-weight: 700; font-size: 15px; }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 14px 16px;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(140, 239, 255, 0.5);
      box-shadow: 0 0 0 4px rgba(140, 239, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
    }

    .helper { font-weight: 400; font-size: 13px; color: var(--muted); }

    button {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    button:hover { transform: translateY(-1px); border-color: rgba(140, 239, 255, 0.45); }
    button.primary { color: var(--accent); border-color: rgba(140, 239, 255, 0.38); background: rgba(140, 239, 255, 0.12); }
    button.warn { color: #ffd8dc; border-color: rgba(255, 154, 165, 0.26); background: rgba(255, 154, 165, 0.12); }

    .message {
      display: none; margin-top: 16px; padding: 14px 16px;
      border-radius: 16px; border: 1px solid transparent; line-height: 1.45;
    }
    .message.show { display: block; }
    .message.ok { color: var(--ok); background: rgba(144, 255, 194, 0.1); border-color: rgba(144, 255, 194, 0.2); }
    .message.error { color: #ffd8dc; background: rgba(255, 154, 165, 0.12); border-color: rgba(255, 154, 165, 0.24); }

    .catalog-item {
      padding: 18px; border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.04);
      display: grid; gap: 12px;
    }

    .item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
    .item-head h3 { font-size: 22px; letter-spacing: -0.02em; }

    .item-meta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted); font-size: 13px; white-space: nowrap;
    }

    .source-box {
      padding: 12px 14px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted); font-size: 13px; word-break: break-all;
    }

    .catalog-list { display: grid; gap: 14px; margin-top: 18px; }
    .empty {
      padding: 24px; border-radius: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted); text-align: center;
    }

    .token-bar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .token-bar input { max-width: 400px; }
    .token-status { font-size: 13px; }
    .token-status.ok { color: var(--ok); }
    .token-status.missing { color: var(--danger); }

    @media (max-width: 720px) {
      body { padding: 16px; }
      .panel { padding: 18px; }
      .item-head { flex-direction: column; }
      .token-bar input { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <h1>Streafler Admin</h1>
      <p>Gestiona tu catalogo. Los cambios se guardan directamente en GitHub y se publican via GitHub Pages.</p>

      <div class="fields" style="margin-top:14px">
        <label>
          GitHub Token
          <div class="token-bar">
            <input id="tokenInput" type="password" placeholder="ghp_xxxxx...">
            <button id="saveTokenBtn" type="button">Guardar</button>
            <span id="tokenStatus" class="token-status missing">Sin token</span>
          </div>
          <span class="helper">Necesario para guardar cambios. Se almacena solo en tu navegador.</span>
        </label>
      </div>

      <div class="top-actions">
        <a style="border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:var(--text);border-radius:999px;padding:11px 16px;text-decoration:none" href="tv.html" target="_blank">Abrir TV</a>
        <button id="reloadButton" type="button">Recargar catalogo</button>
      </div>
    </section>

    <section class="panel">
      <h2>Nuevo item</h2>
      <div class="fields">
        <label>
          Titulo
          <input id="title" type="text" placeholder="Pelicula, serie o evento">
        </label>

        <label>
          Categoria
          <select id="category">
            <option value="movie">Pelicula</option>
            <option value="series">Serie</option>
          </select>
        </label>

        <label>
          Serie / coleccion (opcional)
          <input id="collectionTitle" type="text" placeholder="Got Talent Espana">
          <span class="helper">Si varios items comparten este valor, en la TV apareceran como una sola ficha.</span>
        </label>

        <label>
          Etiqueta episodio (opcional)
          <input id="episodeLabel" type="text" placeholder="Capitulo 1 / T12E04">
        </label>

        <label>
          Link del stream
          <input id="sourceUrl" type="text" placeholder="https://.../manifest.mpd o .m3u8 o .mp4">
        </label>

        <label>
          Poster URL (opcional)
          <input id="posterUrl" type="text" placeholder="https://...poster.jpg">
          <span class="helper">URL directa a una imagen de poster.</span>
        </label>

        <div class="button-row">
          <button id="saveButton" class="primary" type="button">Guardar item</button>
          <button id="resetButton" type="button">Vaciar formulario</button>
        </div>
      </div>

      <div id="message" class="message"></div>
    </section>

    <section class="panel">
      <h2>Catalogo actual</h2>
      <div id="catalogList" class="catalog-list"></div>
    </section>
  </div>

  <script>
    const REPO_OWNER = "digitalarmada1-a11y";
    const REPO_NAME = "tv-android";
    const CATALOG_PATH = "catalogo.json";
    const TOKEN_KEY = "streafler-gh-token";

    let currentCatalog = [];
    let catalogSha = "";

    // --- Token management ---
    function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }

    function saveToken(t) {
      localStorage.setItem(TOKEN_KEY, t.trim());
      updateTokenStatus();
    }

    function updateTokenStatus() {
      const el = document.getElementById("tokenStatus");
      if (getToken()) {
        el.textContent = "Token guardado";
        el.className = "token-status ok";
      } else {
        el.textContent = "Sin token";
        el.className = "token-status missing";
      }
    }

    document.getElementById("saveTokenBtn").addEventListener("click", function() {
      const val = document.getElementById("tokenInput").value.trim();
      if (!val) { showMsg("error", "Pega un token valido."); return; }
      saveToken(val);
      document.getElementById("tokenInput").value = "";
      showMsg("ok", "Token guardado en tu navegador.");
    });

    // --- GitHub API helpers ---
    async function ghGet(path) {
      const token = getToken();
      const headers = { Accept: "application/vnd.github+json" };
      if (token) headers.Authorization = "token " + token;
      const res = await fetch("https://api.github.com/repos/" + REPO_OWNER + "/" + REPO_NAME + "/contents/" + path, { headers });
      if (!res.ok) throw new Error("GitHub API error: " + res.status);
      return res.json();
    }

    async function ghPut(path, content, sha, message) {
      const token = getToken();
      if (!token) throw new Error("Necesitas un GitHub token para guardar.");
      const body = {
        message: message || "Update " + path,
        content: btoa(unescape(encodeURIComponent(content))),
        sha: sha
      };
      const res = await fetch("https://api.github.com/repos/" + REPO_OWNER + "/" + REPO_NAME + "/contents/" + path, {
        method: "PUT",
        headers: {
          Authorization: "token " + token,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json().catch(function() { return {}; });
        throw new Error(err.message || "No se pudo guardar en GitHub (" + res.status + ")");
      }
      return res.json();
    }

    // --- Catalog CRUD ---
    async function fetchCatalog() {
      try {
        const data = await ghGet(CATALOG_PATH);
        catalogSha = data.sha;
        const decoded = decodeURIComponent(escape(atob(data.content)));
        currentCatalog = JSON.parse(decoded);
        if (!Array.isArray(currentCatalog)) currentCatalog = [];
      } catch (e) {
        currentCatalog = [];
        catalogSha = "";
      }
      renderCatalog();
    }

    async function saveCatalog(msg) {
      const content = JSON.stringify(currentCatalog, null, 4) + "\n";
      const result = await ghPut(CATALOG_PATH, content, catalogSha, msg || "Update catalogo");
      catalogSha = result.content.sha;
    }

    function generateId(title) {
      const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      const rand = Math.random().toString(16).slice(2, 14);
      return (slug || "item") + "-" + rand;
    }

    // --- UI helpers ---
    function escapeHtml(v) {
      return String(v || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function showMsg(kind, text) {
      const el = document.getElementById("message");
      el.className = "message show " + kind;
      el.textContent = text;
    }

    function clearMsg() {
      document.getElementById("message").className = "message";
    }

    function resetForm() {
      ["title","collectionTitle","episodeLabel","sourceUrl","posterUrl"].forEach(function(id) {
        document.getElementById(id).value = "";
      });
      document.getElementById("category").value = "movie";
    }

    function renderCatalog() {
      const list = document.getElementById("catalogList");
      if (!currentCatalog.length) {
        list.innerHTML = '<div class="empty">No hay items todavia.</div>';
        return;
      }
      list.innerHTML = currentCatalog.map(function(item, i) {
        var cat = item.category === "series" ? "Serie" : "Pelicula";
        var type = String(item.type || "dash").toUpperCase();
        return '<article class="catalog-item">' +
          '<div class="item-head"><div><h3>' + escapeHtml(item.title) + '</h3></div>' +
          '<span class="item-meta">' + cat + ' - ' + type + ' - #' + (i+1) + '</span></div>' +
          '<div class="source-box">' + escapeHtml(item.source || "Sin fuente") + '</div>' +
          '<div class="item-actions">' +
            (item.collectionTitle ? '<span class="item-meta">Serie: ' + escapeHtml(item.collectionTitle) + '</span>' : '') +
            (item.episodeLabel ? '<span class="item-meta">' + escapeHtml(item.episodeLabel) + '</span>' : '') +
            '<button type="button" data-action="delete" data-index="' + i + '" class="warn">Borrar</button>' +
          '</div></article>';
      }).join("");
    }

    // --- Event listeners ---
    document.getElementById("saveButton").addEventListener("click", async function() {
      clearMsg();
      var title = document.getElementById("title").value.trim();
      var source = document.getElementById("sourceUrl").value.trim();
      if (!title) { showMsg("error", "Falta el titulo."); return; }
      if (!source) { showMsg("error", "Falta el link del stream."); return; }

      var newItem = {
        id: generateId(title),
        title: title,
        description: "",
        source: source,
        manifest: source,
        poster: document.getElementById("posterUrl").value.trim(),
        collectionTitle: document.getElementById("collectionTitle").value.trim(),
        episodeLabel: document.getElementById("episodeLabel").value.trim(),
        category: document.getElementById("category").value,
        type: source.toLowerCase().includes(".m3u8") ? "hls" : source.toLowerCase().includes(".mp4") ? "video" : "dash",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      currentCatalog.push(newItem);

      try {
        await saveCatalog("Add: " + title);
        showMsg("ok", "Item guardado en GitHub.");
        resetForm();
        renderCatalog();
      } catch (e) {
        currentCatalog.pop();
        showMsg("error", e.message);
      }
    });

    document.getElementById("catalogList").addEventListener("click", async function(e) {
      var btn = e.target.closest("button[data-action='delete']");
      if (!btn) return;
      var idx = parseInt(btn.dataset.index);
      if (!confirm("Borrar este item?")) return;

      var removed = currentCatalog.splice(idx, 1)[0];
      try {
        await saveCatalog("Delete: " + (removed.title || "item"));
        showMsg("ok", "Item borrado.");
        renderCatalog();
      } catch (e) {
        currentCatalog.splice(idx, 0, removed);
        showMsg("error", e.message);
        renderCatalog();
      }
    });

    document.getElementById("reloadButton").addEventListener("click", async function() {
      try { await fetchCatalog(); showMsg("ok", "Catalogo recargado."); }
      catch (e) { showMsg("error", e.message); }
    });

    document.getElementById("resetButton").addEventListener("click", function() {
      resetForm(); clearMsg();
    });

    // --- Init ---
    updateTokenStatus();
    fetchCatalog();
  </script>
</body>
</html>
